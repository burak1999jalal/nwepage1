<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buraq Jalal | Premium Reveal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #030712;
            --card-bg: rgba(17, 24, 39, 0.8);
            --text: #f9fafb;
            --p-color: #6366f1;
        }

        /* ألوان الوضع الفاتح */
        .light-theme {
            --bg: #f3f4f6;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text: #111827;
            --p-color: #4338ca;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        #particles-js { position: absolute; width: 100%; height: 100%; z-index: 1; }

        /* طبقة الانتقال السحرية */
        #transition-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
            clip-path: circle(0% at 30px 30px); /* يبدأ من مكان الزر */
            transition: clip-path 1s cubic-bezier(0.77, 0, 0.175, 1);
        }

        #transition-overlay.active {
            clip-path: circle(150% at 30px 30px);
        }

        /* الكارت الرئيسي */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 50px 30px;
            width: 380px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .avatar {
            width: 140px; height: 140px; margin: 0 auto 25px;
            border-radius: 35px; overflow: hidden;
            border: 3px solid var(--primary);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.3);
        }

        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 10px; }

        .pills { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .pill { 
            background: rgba(99, 102, 241, 0.15); color: var(--primary);
            padding: 6px 15px; border-radius: 12px; font-size: 0.8rem; font-weight: 700;
        }

        /* أزرار التواصل بشكل "نيو-مودرن" */
        .social-row { display: flex; justify-content: center; gap: 20px; }
        .social-link {
            width: 55px; height: 55px; border-radius: 18px;
            background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; color: var(--text); text-decoration: none;
            transition: 0.3s; border: 1px solid rgba(255,255,255,0.1);
        }

        .social-link:hover {
            transform: scale(1.1) rotate(5deg);
            background: var(--primary); color: white;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
        }

        /* زر المود */
        .mode-btn {
            position: fixed; top: 30px; left: 30px; z-index: 10000;
            width: 50px; height: 50px; border-radius: 15px;
            background: var(--primary); border: none; color: white;
            cursor: pointer; font-size: 1.2rem;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

    </style>
</head>
<body>

    <div id="particles-js"></div>
    <div id="transition-overlay"></div>

    <button class="mode-btn" onclick="magicTransition()">
        <i id="mode-icon" class="fas fa-sun"></i>
    </button>

    <div class="card">
        <div class="avatar">
            <img src="https://i.postimg.cc/s2cvp4gM/1312.png" alt="براق جلال">
        </div>
        <h1>براق جلال</h1>
        <div class="pills">
            <span class="pill">برمجيات</span>
            <span class="pill">ويب</span>
            <span class="pill">تطبيقات</span>
        </div>
        <p style="opacity: 0.8; margin-bottom: 30px; line-height: 1.6;">
            مبرمج أنظمة ومطور حلول ويب ذكية. أهتم بالتفاصيل الدقيقة لتجربة المستخدم والبرمجة النظيفة.
        </p>

        <div class="social-row">
            <a href="https://instagram.com/b2441999" target="_blank" class="social-link"><i class="fab fa-instagram"></i></a>
            <a href="https://wa.me/9647718906554" target="_blank" class="social-link"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.facebook.com/share/1DFSA9K9J4/" target="_blank" class="social-link"><i class="fab fa-facebook-f"></i></a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        function initParticles(color) {
            particlesJS("particles-js", {
                "particles": {
                    "number": { "value": 50 },
                    "color": { "value": color },
                    "shape": { "type": "circle" },
                    "line_linked": { "enable": true, "color": color, "opacity": 0.2 },
                    "move": { "enable": true, "speed": 1.5 }
                }
            });
        }
        initParticles("#6366f1");

        function magicTransition() {
            const overlay = document.getElementById('transition-overlay');
            const body = document.body;
            const icon = document.getElementById('mode-icon');
            const isDark = !body.classList.contains('light-theme');

            // ضبط لون الطبقة لتكون نفس لون الخلفية القادمة
            overlay.style.backgroundColor = isDark ? "#f3f4f6" : "#030712";
            
            // تفعيل "الموجة"
            overlay.classList.add('active');

            setTimeout(() => {
                // تغيير الثيم الفعلي في منتصف الأنيميشن
                body.classList.toggle('light-theme');
                icon.className = isDark ? "fas fa-moon" : "fas fa-sun";
                initParticles(isDark ? "#4338ca" : "#6366f1");
            }, 500);

            setTimeout(() => {
                // إعادة الطبقة لوضعها الطبيعي
                overlay.classList.remove('active');
            }, 1000);
        }
    </script>
</body>
</html>
